[pygbag]
title = "Mesh Engine"
app_name = "Mesh Demo"
entrypoint = "web_main.py"
output = "build/web"
include = [
  "packs/**",
  "assets/**",
  "config.json",
  "scenes/**",
  "worlds/**"
]
exclude = [
  ".mesh/**",
  ".mypy_cache/**",
  ".pytest_cache/**",
  ".ruff_cache/**",
  ".venv/**",
  ".vscode/**",
  ".git/**",
  "artifacts/**",
  "build/**",
  "dist/**",
  "docs/**",
  "examples/**",
  "MagicMock/**",
  "__pycache__/**",
  "plans/**",
  "replays/**",
  "saves/**",
  "tests/**"
]
