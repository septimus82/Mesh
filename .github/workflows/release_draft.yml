name: Release Draft

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to draft (e.g. v0.4.1)"
        required: true
        type: string
      target_ref:
        description: "Git ref to check out before packaging"
        required: false
        default: "main"
        type: string
      artifacts_run_id:
        description: "Optional CI run id to download artifacts from (leave empty to generate here)"
        required: false
        default: ""
        type: string

jobs:
  draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            pytest.ini

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        if: ${{ inputs.artifacts_run_id == '' }}
        run: |
          python -m compileall -q engine mesh_cli tooling tests

      - name: Release preflight
        if: ${{ inputs.artifacts_run_id == '' }}
        run: |
          python -m mesh_cli release-preflight --tag "${{ inputs.tag }}" --artifacts artifacts

      - name: Download artifacts from another run
        if: ${{ inputs.artifacts_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.artifacts_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts_external
          pattern: mesh-artifacts-*
          merge-multiple: true

      - name: Validate downloaded artifact bundle
        if: ${{ inputs.artifacts_run_id != '' }}
        run: |
          python -m mesh_cli artifacts-validate --artifacts artifacts_external

      - name: Release preflight (downloaded artifacts)
        if: ${{ inputs.artifacts_run_id != '' }}
        run: |
          python -m mesh_cli release-preflight --tag "${{ inputs.tag }}" --artifacts artifacts_external

      - name: Resolve artifact root + release notes
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.artifacts_run_id }}" ]; then
            root="artifacts_external"
          else
            root="artifacts"
          fi
          if [ ! -d "$root" ]; then
            echo "::error::artifact root not found: $root"
            exit 1
          fi
          notes_file="$(find "$root" -type f -name 'release_notes.md' | sort | head -n 1 || true)"
          if [ -z "$notes_file" ]; then
            echo "::error::release_notes.md not found under $root"
            exit 1
          fi
          head -n 120 "$notes_file" > release_notes_body.md
          echo "artifact_root=$root" >> "$GITHUB_OUTPUT"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Upload draft-release workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-draft-artifacts-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 7
          path: |
            ${{ steps.resolve.outputs.artifact_root }}/
            release_notes_body.md

      - name: Ensure tag exists on origin
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if ! git ls-remote --tags --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag does not exist on origin: $tag"
            echo "Pre-create and push the tag, then rerun this workflow."
            exit 1
          fi

      - name: Build deterministic artifacts zip
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import zipfile

          root = Path("${{ steps.resolve.outputs.artifact_root }}").resolve()
          target = Path("artifacts_bundle.zip").resolve()
          entries = sorted(p for p in root.rglob("*") if p.is_file())
          with zipfile.ZipFile(target, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in entries:
                  rel = path.relative_to(root).as_posix()
                  info = zipfile.ZipInfo(rel)
                  info.date_time = (1980, 1, 1, 0, 0, 0)
                  info.compress_type = zipfile.ZIP_DEFLATED
                  info.external_attr = 0o100644 << 16
                  zf.writestr(info, path.read_bytes())
          print(target.as_posix())
          PY

      - name: Create draft GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::A release already exists for tag: $tag"
            exit 1
          fi
          version="$(python - <<'PY'
          from mesh_cli.version_info import get_tool_version
          print(get_tool_version())
          PY
          )"
          gh release create "$tag" "artifacts_bundle.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Mesh Engine $version" \
            --notes-file "release_notes_body.md" \
            --draft \
            --latest=false
