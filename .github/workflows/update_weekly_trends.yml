name: Update Weekly Trends

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Target branch/ref to refresh weekly trends against"
        required: false
        default: "main"
        type: string
      python_version:
        description: "Python version for weekly trends refresh"
        required: false
        default: "3.11"
        type: string
      reason:
        description: "Optional reason/note for this weekly trends refresh"
        required: false
        default: ""
        type: string

jobs:
  update-weekly-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            pytest.ini

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Generate verify artifacts
        run: |
          xvfb-run -a python -m mesh_cli verify-all --artifacts artifacts --ci-bundle --release-notes-artifact

      - name: Validate generated artifacts
        run: |
          python -m mesh_cli artifacts-validate --artifacts artifacts

      - name: Update weekly trends file
        run: |
          python -m mesh_cli trends-update --artifacts artifacts --trend-file tooling/metrics/weekly_trends.json

      - name: Build trends delta panel
        if: always()
        run: |
          python -m mesh_cli trends-report --trend-file tooling/metrics/weekly_trends.json --last 8 --format markdown --out artifacts/trends_delta.md || true

      - name: Trends delta to Step Summary
        if: always()
        run: |
          echo "## Trends delta panel" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/trends_delta.md ]; then
            cat artifacts/trends_delta.md >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "_(trends delta unavailable)_" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Detect weekly trends changes
        id: changes
        run: |
          if git diff --quiet -- tooling/metrics/weekly_trends.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR metadata
        id: pr_meta
        if: steps.changes.outputs.changed == 'true'
        env:
          INPUT_REASON: ${{ inputs.reason }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          reason = str(os.getenv("INPUT_REASON", "") or "").strip() or "not provided"
          trends_path = Path("tooling/metrics/weekly_trends.json")
          summary = "verify_total_ms=?, swallowed_total=?, verify_ok=?, mypy_budget_ok=?, exception_budget_ok=?"

          if trends_path.exists():
            try:
              payload = json.loads(trends_path.read_text(encoding="utf-8"))
              entries = payload.get("entries", []) if isinstance(payload, dict) else []
              rows = [row for row in entries if isinstance(row, dict)]
              if rows:
                row = rows[-1]
                summary = (
                  f"verify_total_ms={row.get('verify_total_ms', '?')}, "
                  f"swallowed_total={row.get('swallowed_total', '?')}, "
                  f"verify_ok={row.get('verify_ok', '?')}, "
                  f"mypy_budget_ok={row.get('mypy_budget_ok', '?')}, "
                  f"exception_budget_ok={row.get('exception_budget_ok', '?')}"
                )
            except Exception:
              pass

          trends_delta = ""
          trends_delta_path = Path("artifacts/trends_delta.md")
          if trends_delta_path.exists():
            try:
              trends_delta = trends_delta_path.read_text(encoding="utf-8").rstrip()
            except Exception:
              trends_delta = ""

          body_lines = [
            "Automated weekly trends refresh.",
            "",
            f"Reason: `{reason}`",
            f"Last entry: `{summary}`",
            "",
            "Updated file:",
            "- `tooling/metrics/weekly_trends.json`",
          ]
          if trends_delta:
            body_lines.extend(["", trends_delta])
          Path("artifacts/update_weekly_trends_pr_body.md").write_text(
            "\n".join(body_lines).rstrip() + "\n",
            encoding="utf-8",
          )

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
            fh.write(f"reason={reason}\n")
            fh.write(f"last_entry_summary={summary}\n")
          PY

      - name: Create weekly trends PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: weekly/trends-${{ github.run_id }}
          base: ${{ inputs.target_ref }}
          title: "Update weekly trends"
          commit-message: "chore(ci): update weekly trends"
          body-path: artifacts/update_weekly_trends_pr_body.md
          add-paths: |
            tooling/metrics/weekly_trends.json
          delete-branch: true

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-trends-artifacts-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          path: |
            artifacts/
