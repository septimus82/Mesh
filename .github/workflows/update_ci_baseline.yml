name: Update CI Baseline

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Target branch/ref to refresh baseline against"
        required: false
        default: "main"
        type: string
      python_version:
        description: "Python version for baseline refresh"
        required: false
        default: "3.11"
        type: string
      reason:
        description: "Optional reason/note for this baseline refresh"
        required: false
        default: ""
        type: string

jobs:
  update-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            pytest.ini

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Generate verify artifacts
        run: |
          xvfb-run -a python -m mesh_cli verify-all --artifacts artifacts --ci-bundle --release-notes-artifact

      - name: Validate generated artifacts
        run: |
          python -m mesh_cli artifacts-validate --artifacts artifacts

      - name: Update committed baseline directory
        run: |
          python -m mesh_cli baseline-update --baseline-dir tooling/metrics/ci_baseline_artifacts --artifacts artifacts --no-verify-all

      - name: Ensure baseline metadata includes run id + reason
        env:
          INPUT_REASON: ${{ inputs.reason }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          meta_path = Path("tooling/metrics/ci_baseline_artifacts/BASELINE_META.json")
          payload = {}
          if meta_path.exists():
              try:
                  payload = json.loads(meta_path.read_text(encoding="utf-8"))
                  if not isinstance(payload, dict):
                      payload = {}
              except Exception:
                  payload = {}

          payload.setdefault("schema_version", 1)
          payload.setdefault("created_utc", "1970-01-01T00:00:00Z")
          payload.setdefault("source_commit", "unknown")
          payload.setdefault("package_version", "unknown")
          payload.setdefault("public_api_semver", "unknown")
          payload["source_workflow_run_id"] = str(os.getenv("GITHUB_RUN_ID_VALUE", "") or "").strip() or None

          reason = str(os.getenv("INPUT_REASON", "") or "").strip()
          if reason:
              payload["notes"] = reason
          elif "notes" not in payload:
              payload["notes"] = "baseline refresh"

          meta_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Build PR metadata
        id: pr_meta
        env:
          INPUT_REASON: ${{ inputs.reason }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          meta_path = Path("tooling/metrics/ci_baseline_artifacts/BASELINE_META.json")
          meta = {}
          if meta_path.exists():
              try:
                  parsed = json.loads(meta_path.read_text(encoding="utf-8"))
                  if isinstance(parsed, dict):
                      meta = parsed
              except Exception:
                  meta = {}

          commit = str(meta.get("source_commit", "unknown") or "unknown")
          package = str(meta.get("package_version", "unknown") or "unknown")
          public_api = str(meta.get("public_api_semver", "unknown") or "unknown")
          run_id = str(meta.get("source_workflow_run_id", "unknown") or "unknown")
          reason = str(os.getenv("INPUT_REASON", "") or "").strip() or "not provided"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"meta_line=commit={commit}, package={package}, public_api={public_api}, run_id={run_id}\n")
              fh.write(f"reason_line={reason}\n")
          PY

      - name: Create baseline update PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci/baseline-update-${{ github.run_id }}
          base: ${{ inputs.target_ref }}
          title: "Update CI baseline artifacts"
          commit-message: "chore(ci): update baseline artifacts"
          body: |
            Automated CI baseline refresh.

            Baseline meta: `${{ steps.pr_meta.outputs.meta_line }}`
            Reason: `${{ steps.pr_meta.outputs.reason_line }}`

            Files updated under `tooling/metrics/ci_baseline_artifacts/`.
          add-paths: |
            tooling/metrics/ci_baseline_artifacts/**
          delete-branch: true

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-refresh-artifacts-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: error
          path: |
            artifacts/
