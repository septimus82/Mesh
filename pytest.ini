[pytest]
testpaths = tests
filterwarnings =
    # ignore::arcade.exceptions.PerformanceWarning
addopts = -W error --strict-markers -m "not slow and not e2e"
markers =
    fast: quick unit/contract tests for rapid local runs
    slow: long-running tests
    integration: integration tests (filesystem-heavy, multi-module)
    e2e: end-to-end / engine runtime tests
    builtin_behaviours: load builtin behaviour registry for validation tests
    packaging_hygiene: CI-only tests that check for forbidden paths/artifacts
